name: Build Mac Standalone App

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend (Vite)
        run: |
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac App via PyInstaller
        run: |
          pyinstaller build_mac.spec

      - name: Archive App Bundle
        run: |
          cd dist
          zip -r RetiroMoney-Mac.zip RetiroMoney.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RetiroMoney-Mac
          path: dist/RetiroMoney-Mac.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/RetiroMoney-Mac.zip
